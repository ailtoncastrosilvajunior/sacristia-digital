# frozen_string_literal: true

default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("DATABASE_HOST", "localhost") %>
  port: <%= ENV.fetch("DATABASE_PORT", "5432") %>
  username: <%= ENV.fetch("DATABASE_USERNAME", "postgres") %>
  password: <%= ENV.fetch("DATABASE_PASSWORD", "") %>

development:
  <<: *default
  database: <%= ENV.fetch("DATABASE_NAME", "sacristia_digital_dev") %>

test:
  <<: *default
  database: <%= ENV.fetch("TEST_DATABASE_NAME", "sacristia_digital_test") %>

# Produção: use DATABASE_URL (recomendado na DigitalOcean) ou host/usuário/senha.
# SSL: padrão "disable" evita "dh key too small" (OpenSSL 3 × TLS antigo no PG).
# Quando o cluster aceitar TLS forte: DATABASE_SSLMODE=require no painel ou na URL.
<% db_url = ENV["DATABASE_URL"].to_s.strip %>
<% db_url = nil if db_url.empty? %>
production:
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
<% if db_url %>
  url: <%= db_url %>
<% else %>
  host: <%= ENV.fetch("DATABASE_HOST", "localhost") %>
  port: <%= ENV.fetch("DATABASE_PORT", "5432") %>
  database: <%= ENV.fetch("DATABASE_NAME", "sacristia_digital_prod") %>
  username: <%= ENV.fetch("DATABASE_USERNAME", "postgres") %>
  password: <%= ENV.fetch("DATABASE_PASSWORD") %>
  sslmode: <%= ENV.fetch("DATABASE_SSLMODE", "disable") %>
<% end %>
