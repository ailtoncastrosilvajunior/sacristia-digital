# frozen_string_literal: true

default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("DATABASE_HOST", "localhost") %>
  port: <%= ENV.fetch("DATABASE_PORT", "5432") %>
  username: <%= ENV.fetch("DATABASE_USERNAME", "postgres") %>
  password: <%= ENV.fetch("DATABASE_PASSWORD", "") %>

development:
  <<: *default
  database: <%= ENV.fetch("DATABASE_NAME", "sacristia_digital_development") %>

test:
  <<: *default
  database: <%= ENV.fetch("TEST_DATABASE_NAME", "sacristia_digital_test") %>

production:
  <<: *default
  database: sacristia_digital_production
  username: sacristia_digital
  password: <%= ENV["SACRISTIA_DIGITAL_DATABASE_PASSWORD"] %>
